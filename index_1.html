<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Invincible: Viltrum Defense</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000005; color: white; font-family: 'Courier New', Courier, monospace; -webkit-user-select: none; user-select: none; }
        canvas { display: block; cursor: crosshair; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 100vw; max-height: 100vh; background: #000; }

        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 5; }
        #ui { font-size: 24px; text-shadow: 2px 2px 0 #000; font-weight: bold; }
        #scoreVal { color: #FFD700; }
        #highScore { font-size: 18px; color: #aaa; margin-top: 5px; }
        #hp-bar { display: flex; gap: 5px; margin-top: 10px; }
        .heart { width: 25px; height: 25px; background: #ff4d4d; border: 2px solid #fff; border-radius: 50%; transition: background 0.2s; }
        .heart.empty { background: #333; }
        #rage-container { width: 150px; height: 10px; border: 2px solid #fff; background: #222; margin-top: 10px; }
        #rage-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff4400, #ff8800); transition: width 0.2s; }
        #level-ui { margin-top: 8px; font-size: 14px; color: #88ffcc; }
        #xp-container { width: 150px; height: 8px; border: 2px solid #44cc88; background: #112211; margin-top: 4px; }
        #xp-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff88, #00ccff); transition: width 0.3s; }
        #wave-ui { margin-top: 8px; font-size: 14px; color: #ffaa44; }

        #abilities-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 5; pointer-events: none; }
        .ability-slot { width: 54px; height: 54px; border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.7); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 22px; position: relative; }
        .ability-slot .ab-key { position: absolute; bottom: 2px; right: 4px; font-size: 10px; color: #aaa; }
        .ability-slot .ab-cd { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #fff; }
        .ability-slot.ready { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,200,0.5); }

        #boss-phase-ui { position: absolute; top: 20px; right: 20px; pointer-events: none; z-index: 5; text-align: right; display: none; }
        #boss-phase-label { font-size: 14px; color: #aaa; letter-spacing: 2px; margin-bottom: 6px; }
        #boss-phase-bar-wrap { width: 220px; height: 16px; background: #1a0000; border: 2px solid #8B0000; border-radius: 4px; overflow: hidden; margin-left: auto; }
        #boss-phase-bar { height: 100%; background: #ff2200; width: 100%; transition: width 0.3s; }
        #boss-stun-hint { font-size: 13px; color: #FFD700; margin-top: 8px; opacity: 0; transition: opacity 0.3s; }

        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,10,0.92); z-index: 10; }
        .menu-banner { width: 100%; background: #202060; border-top: 4px solid #fff; border-bottom: 4px solid #fff; text-align: center; padding: 20px 0; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 50px; letter-spacing: 5px; color: #fff; text-shadow: 3px 3px 0 #FFD700; }
        .btn-group { display: flex; gap: 15px; }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; border: 3px solid #fff; background: #000; color: #fff; font-family: inherit; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #fff; color: #000; transform: scale(1.1); }

        #death-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: rgba(0,0,0,0); animation: fadeInDeath 0.8s forwards; }
        @keyframes fadeInDeath { to { background: rgba(0,0,0,0.88); } }
        #death-inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; animation: slideUpDeath 0.6s 0.3s both; }
        @keyframes slideUpDeath { from { opacity:0; transform: translate(-50%,-40%); } to { opacity:1; transform: translate(-50%,-50%); } }
        #death-title { font-size: 80px; font-weight: bold; letter-spacing: 8px; color: #ff2200; text-shadow: 0 0 40px #ff2200, 0 0 80px #880000; margin-bottom: 10px; }
        #death-sub { font-size: 18px; color: #888; letter-spacing: 3px; margin-bottom: 30px; }
        #death-score { font-size: 42px; color: #FFD700; font-weight: bold; margin-bottom: 8px; }
        #death-hs { font-size: 18px; color: #aaa; margin-bottom: 40px; }
        #death-btns { display: flex; gap: 16px; justify-content: center; }
        .death-btn { padding: 14px 36px; font-size: 17px; cursor: pointer; border: 2px solid; background: transparent; font-family: inherit; font-weight: bold; letter-spacing: 2px; transition: all 0.2s; }
        .death-btn.primary { border-color: #ff2200; color: #ff2200; }
        .death-btn.primary:hover { background: #ff2200; color: #000; }
        .death-btn.secondary { border-color: #555; color: #aaa; }
        .death-btn.secondary:hover { background: #555; color: #fff; }

        #shop-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; background: rgba(0,0,20,0.95); flex-direction: column; align-items: center; justify-content: center; }
        #shop-screen.open { display: flex; }
        #shop-title { font-size: 36px; font-weight: bold; letter-spacing: 6px; color: #FFD700; margin-bottom: 6px; }
        #shop-coins { font-size: 20px; color: #FFD700; margin-bottom: 28px; }
        #shop-grid { display: grid; grid-template-columns: repeat(3, 200px); gap: 16px; margin-bottom: 28px; }
        .shop-item { border: 2px solid #333; background: #0a0a1a; padding: 18px 14px; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .shop-item:hover:not(.sold) { border-color: #FFD700; background: #1a1a0a; transform: scale(1.04); }
        .shop-item.sold { opacity: 0.4; cursor: default; }
        .shop-item .si-icon { font-size: 36px; margin-bottom: 8px; }
        .shop-item .si-name { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 6px; }
        .shop-item .si-desc { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.5; }
        .shop-item .si-cost { font-size: 16px; color: #FFD700; font-weight: bold; }
        #shop-skip { padding: 12px 40px; font-size: 16px; cursor: pointer; border: 2px solid #555; background: transparent; color: #aaa; font-family: inherit; font-weight: bold; letter-spacing: 2px; transition: all 0.2s; }
        #shop-skip:hover { border-color: #fff; color: #fff; }

        #lvlup-banner { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 8; display: none; text-align: center; animation: lvlupAnim 2s forwards; }
        @keyframes lvlupAnim { 0%{opacity:0;transform:translateX(-50%) translateY(20px)} 20%{opacity:1;transform:translateX(-50%) translateY(0)} 80%{opacity:1} 100%{opacity:0;transform:translateX(-50%) translateY(-20px)} }
        #lvlup-banner .lvl-text { font-size: 36px; font-weight: bold; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; letter-spacing: 4px; }
        #lvlup-banner .lvl-sub { font-size: 16px; color: #88ffcc; margin-top: 6px; }

        #wave-banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 8; display: none; text-align: center; }
        #wave-banner .wb-text { font-size: 48px; font-weight: bold; color: #ff8800; text-shadow: 0 0 30px #ff4400; letter-spacing: 6px; }
        #wave-banner .wb-sub  { font-size: 18px; color: #ffaa44; margin-top: 8px; }
        /* Кнопка магазина на экране */
.shop-button {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 12px 20px;
  font-size: 18px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #000;
  border: 3px solid #FF8C00;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  z-index: 100;
  transition: all 0.3s ease;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}

.shop-button:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
}

.shop-button:active {
  transform: scale(0.95);
}

/* Экран магазина */
.shop-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  animation: fadeIn 0.3s ease;
}

.shop-screen.hidden {
  display: none;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.shop-container {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 3px solid #FFD700;
  border-radius: 15px;
  padding: 30px;
  max-width: 850px;
  width: 92%;
  max-height: 85vh;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #FFD700 transparent;
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
  color: #fff;
}
.shop-container::-webkit-scrollbar { width: 6px; }
.shop-container::-webkit-scrollbar-track { background: transparent; }
.shop-container::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 3px; }

.shop-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 2px solid #FFD700;
  padding-bottom: 15px;
}

.shop-header h2 {
  margin: 0;
  font-size: 32px;
  color: #FFD700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

.close-btn {
  background: #c0392b;
  border: none;
  color: #fff;
  font-size: 22px;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.close-btn:hover {
  background: #e74c3c;
  transform: scale(1.15);
}

.shop-coins {
  font-size: 18px;
  margin-bottom: 20px;
  color: #FFD700;
  font-weight: bold;
}

.shop-items {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.shop-item {
  background: rgba(255, 215, 0, 0.1);
  border: 2px solid #FFD700;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  min-width: 180px;
}

.shop-item:hover {
  background: rgba(255, 215, 0, 0.2);
  transform: translateY(-5px);
  box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
}

.shop-item.sold-out {
  opacity: 0.5;
  cursor: not-allowed;
  border-color: #666;
}

.shop-item.sold-out:hover {
  background: rgba(255, 215, 0, 0.1);
  transform: none;
  box-shadow: none;
}

.shop-item-icon {
  font-size: 48px;
  margin-bottom: 10px;
  line-height: 1.2;
}

.shop-item-name {
  font-weight: bold;
  color: #FFD700;
  margin-bottom: 5px;
}

.shop-item-desc {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
  min-height: 20px;
}

.shop-item-cost {
  color: #00FF00;
  font-weight: bold;
  margin-bottom: 8px;
}

.shop-item-bought {
  font-size: 11px;
  color: #999;
  margin-bottom: 8px;
}

.buy-btn {
  background: linear-gradient(135deg, #00FF00, #00AA00);
  color: #000;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  transition: all 0.3s ease;
}

.buy-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
}

.buy-btn:disabled {
  background: #555;
  color: #999;
  cursor: not-allowed;
  opacity: 0.6;
}

.continue-btn {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background: linear-gradient(135deg, #00FF00, #00AA00);
  color: #000;
  border: 2px solid #FFD700;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}

.continue-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
}

.continue-btn:active {
  transform: scale(0.95);
}

/* Скины */
.skin-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 700px) {
  .skin-grid { grid-template-columns: repeat(2, 1fr); }
}
.skin-card { background: rgba(0, 0, 0, 0.7); border: 1px solid #555; border-radius: 12px; padding: 12px 10px 14px; text-align: center; cursor: pointer; transition: all 0.25s ease; }
.skin-card:hover { transform: scale(1.10); border-color: #FFD700; }
.skin-card.active { border-color: #FFD700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
.skin-preview-wrap { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 8px 0 0; display: inline-block; width: 100%; margin-bottom: 4px; }
.skin-preview-wrap canvas { display: block; margin: 0 auto; max-width: 90px; max-height: 100px; image-rendering: pixelated; opacity: 0; transition: opacity 0.5s ease; }
.skin-preview-wrap canvas.loaded { opacity: 1; }
.skin-card .sc-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 2px; }
.skin-card .sc-price { font-size: 11px; color: #FFD700; margin-bottom: 8px; min-height: 14px; }
.skin-card .sc-btn { display: inline-block; padding: 5px 12px; border-radius: 5px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; transition: all 0.2s; font-family: inherit; letter-spacing: 0.5px; }
.skin-card .sc-btn.select { background: #FFD700; color: #000; }
.skin-card .sc-btn.select:hover { background: #ffed4a; }
.skin-card .sc-btn.buy { background: #00aa00; color: #fff; }
.skin-card .sc-btn.buy:hover { background: #00cc00; }
.skin-card .sc-btn.owned { background: #555; color: #aaa; cursor: default; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="ui">Счет: <span id="scoreVal">0</span></div>
    <div id="highScore">Рекорд: <span id="highVal">0</span></div>
    <div id="hp-bar"></div>
    <div id="rage-container"><div id="rage-fill"></div></div>
    <div id="level-ui">Уровень: <span id="levelVal">1</span></div>
    <div id="xp-container"><div id="xp-fill"></div></div>
    <div id="wave-ui">Волна: <span id="waveVal">1</span></div>
</div>
<!-- Кнопка магазина в игре -->
<button id="shopButton" class="shop-button">🛍️ Магазин</button>

<!-- Экран магазина -->
<div id="shopScreen" class="shop-screen hidden">
  <div class="shop-container">
    <div class="shop-header">
      <h2>МАГАЗИН</h2>
      <button id="closeShopBtn" class="close-btn">✕</button>
    </div>
    
    <div class="shop-coins">
      💰 Монеты: <span id="shopCoins">0</span>
    </div>
    
    <div class="shop-items" id="shopItems">
      <!-- Товары будут вставлены сюда JavaScript -->
    </div>
    
    <button id="continueBtnShop" class="continue-btn">Продолжить игру</button>
    <button id="skinsBtn" class="continue-btn" style="margin-top:8px;border-color:#FFD700;color:#FFD700;">🎨 Скины</button>
  </div>
</div>

<!-- Экран выбора скинов -->
<div id="skinScreen" class="shop-screen hidden">
  <div class="shop-container">
    <div class="shop-header">
      <h2>🎨 ВЫБОР СКИНА</h2>
      <button id="closeSkinBtn" class="close-btn">✕</button>
    </div>
    <div class="skin-grid" id="skinItems">
    </div>
    <button id="backToShopBtn" class="continue-btn">← Назад в магазин</button>
  </div>
</div>

<div id="abilities-bar">
    <div class="ability-slot" id="ab-slot-0"><span>🛡️</span><span class="ab-key">Q</span></div>
    <div class="ability-slot" id="ab-slot-1"><span>⚡</span><span class="ab-key">E</span></div>
    <div class="ability-slot" id="ab-slot-2"><span>💥</span><span class="ab-key">R</span></div>
</div>

<div id="boss-phase-ui">
    <div id="boss-phase-label">АТАКИ ДО ОГЛУШЕНИЯ</div>
    <div id="boss-phase-bar-wrap"><div id="boss-phase-bar"></div></div>
    <div id="boss-stun-hint">⚡ ОГЛУШЁН — БИТЬ!</div>
</div>

<div id="menu">
    <div class="menu-banner"><h1>INVINCIBLE</h1></div>
    <div class="btn-group">
        <button onclick="startGame(1)">Легко</button>
        <button onclick="startGame(2)">Нормально</button>
        <button onclick="startGame(3)">Безумие</button>
    </div>
</div>

<div id="death-screen">
    <div id="death-inner">
        <div id="death-title">ПОГИБ</div>
        <div id="death-sub">ЗЕМЛЯ ПАЛА</div>
        <div id="death-score">0 очков</div>
        <div id="death-hs"></div>
        <div id="death-btns">
            <button class="death-btn primary" onclick="startGame(lastDifficulty)">↩ СНОВА</button>
            <button class="death-btn secondary" onclick="goMenu()">В МЕНЮ</button>
        </div>
    </div>
</div>

<div id="shop-screen">
    <div id="shop-title">🛒 МАГАЗИН</div>
    <div id="shop-coins">💰 <span id="coinVal">0</span> монет</div>
    <div id="shop-grid"></div>
    <button id="shop-skip" onclick="closeShop()">Продолжить без покупки →</button>
</div>

<div id="lvlup-banner">
    <div class="lvl-text">УРОВЕНЬ <span id="lvlup-num">2</span>!</div>
    <div class="lvl-sub" id="lvlup-bonus">+1 Жизнь</div>
</div>

<div id="wave-banner">
    <div class="wb-text" id="wb-text">ВОЛНА 1</div>
    <div class="wb-sub"  id="wb-sub">Приготовься!</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════

let wave = 1;
let waveTimer = 0;
let waveDuration = 600;   // тиков активной волны
let breakTime    = 180;   // тиков перерыва между волнами
let inWave = true;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GAME_WIDTH = 1200, GAME_HEIGHT = 900;

let gameState = 'menu';
let score = 0, difficulty = 1, lastDifficulty = 1;
let currentLocation = 'space';
let isBossFight = false, boss = null;
let enemies = [], miniBosses = [], stars = [], projectiles = [], particles = [], healthPacks = [], rocks = [];
let enemySpawnTimer = 0, miniBossSpawnTimer = 0, healthPackTimer = 0, shake = 0;
let isPaused = false, bossLoaderActive = false;
let coins = 0;

// ── PLAYER ──
let player = {
    x:600, y:450, targetX:600, targetY:450,
    angle:0, isDashing:false, dashTimer:0,
    hp:3, maxHp:3, invulnerable:0,
    rage:0, isRage:false,
    level:1, xp:0, xpToNext:100,
    dashCooldown:0,
    dashDmg:1, dashRadius:70, dashCooldownMax:50,
    projectileBlock:false,
    // FIX: вектор рывка — куда летит игрок во время dash
    dashVX:0, dashVY:0
};

// ── ABILITIES ──
const ABILITIES = [
    { name:'Щит',    icon:'🛡️', desc:'Защита от урона 3 сек', cooldown:600, timer:0, active:false, activeTimer:0, duration:180, key:'Q', keyCode:'KeyQ' },
    { name:'Молния', icon:'⚡', desc:'Удар по всем врагам вокруг', cooldown:400, timer:0, active:false, activeTimer:0, range:280, key:'E', keyCode:'KeyE' },
    { name:'Взрыв',  icon:'💥', desc:'Взрыв всех снарядов', cooldown:500, timer:0, active:false, activeTimer:0, key:'R', keyCode:'KeyR' },
];

// ── SHOP ──
const SHOP_ITEMS = [
    { id:'maxhp',     icon:'❤️',  name:'+1 Жизнь',      desc:'Увеличить макс. HP на 1',      cost:300, maxBuy:2, bought:0 },
    { id:'dash',      icon:'⚡',  name:'Быстрый рывок',  desc:'Кулдаун рывка −20%',           cost:250, maxBuy:3, bought:0 },
    { id:'dashradius',icon:'💥',  name:'Радиус удара',   desc:'Зона поражения рывком +30%',   cost:200, maxBuy:3, bought:0 },
    { id:'ragecharge',icon:'🔥',  name:'Ярость+',        desc:'Ярость копится быстрее',       cost:200, maxBuy:2, bought:0 },
    { id:'shield',    icon:'🛡️', name:'Щит CD−',        desc:'Кулдаун щита −25%',            cost:300, maxBuy:2, bought:0 },
    { id:'lightning', icon:'⚡',  name:'Молния CD−',     desc:'Кулдаун молнии −25%',          cost:300, maxBuy:2, bought:0 },
];

// Сколько купленных ragecharge апгрейдов (влияет на скорость ярости)
function getRageMultiplier() {
    const rc = SHOP_ITEMS.find(i=>i.id==='ragecharge');
    return rc ? 1 + rc.bought * 0.4 : 1;
}

function loadSkin(skin) {
    if (skin.id === 'mark') return; // mark already loaded via data URI
    const img = new Image();
    img.onload = () => { images[skin.id] = img; };
    img.onerror = () => {};
    img.src = 'images/' + skin.file;
}
SKINS.forEach(loadSkin);
function makePlaceholder(name, w, h) {
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    const cx = c.getContext('2d');
    cx.fillStyle='#111'; cx.fillRect(0,0,w,h);
    const colors={mark:'cyan',enemy:'hotpink',miniboss:'#aa44ff',boss:'#ff8800',kregg:'#ff4444',thragg:'#ff2200'};
    cx.fillStyle=colors[name]||'#888';
    cx.beginPath(); cx.arc(w/2,h/2,Math.min(w,h)*0.32,0,Math.PI*2); cx.fill();
    c.complete=true; return c;
}
function loadImage(name,src) {
    const img=new Image();
    img.onload=()=>{images[name]=img;};
    img.onerror=()=>{
        const sizes={mark:[90,90],enemy:[70,70],miniboss:[120,120],mb_guard:[120,120],mb_hunter:[110,110],mb_bomber:[140,140],boss:[250,250],kregg:[250,250],thragg:[300,300],viltrum_bg:[GAME_WIDTH,GAME_HEIGHT]};
        const s=sizes[name]||[64,64];
        if(name==='viltrum_bg'){
            const c=document.createElement('canvas');c.width=s[0];c.height=s[1];
            const cx=c.getContext('2d');
            cx.fillStyle='#003040';cx.fillRect(0,0,s[0],s[1]);
            cx.fillStyle='#205080';cx.beginPath();cx.arc(s[0]*0.7,s[1]*0.3,Math.min(s[0],s[1])*0.25,0,Math.PI*2);cx.fill();
            c.complete=true;images[name]=c;
        } else { images[name]=makePlaceholder(name,s[0],s[1]); }
    };
    img.src=src; images[name]=img;
}

//  PARTICLES
// ════════════════════════════════════════════════════════════════
function spawnParticles(x, y, count, colorArr, speed=5, life=40, size=6) {
    for (let i=0; i<count; i++) {
        const a = Math.random()*Math.PI*2;
        const spd = speed * (0.4 + Math.random()*0.8);
        const color = colorArr[Math.floor(Math.random()*colorArr.length)];
        particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life, maxLife:life, size:size*(0.5+Math.random()*0.7), color, type:'dot' });
    }
}
function spawnExplosion(x, y, colorArr) {
    spawnParticles(x, y, 18, colorArr, 8, 50, 8);
    for(let i=0;i<12;i++){
        const a=(i/12)*Math.PI*2, spd=12+Math.random()*6;
        particles.push({ x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:30,maxLife:30,size:4,color:'#fff',type:'dot' });
    }
}
function spawnDashTrail(x, y) {
    particles.push({ x:x+(Math.random()-0.5)*20, y:y+(Math.random()-0.5)*20, vx:0,vy:2, life:20,maxLife:20,size:14,color:'#00ffcc',type:'trail' });
}
function updateParticles() {
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life--;
        if(p.life<=0) particles.splice(i,1);
    }
}
function drawParticles() {
    particles.forEach(p=>{
        const alpha = p.life/p.maxLife;
        ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=p.color;
        if(p.type==='trail'){ ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill(); }
        else { ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill(); }
        ctx.restore();
    });
}

// ════════════════════════════════════════════════════════════════
//  SCORE / XP
// ════════════════════════════════════════════════════════════════
function addScore(amount) {
    score += amount;
    coins += Math.floor(amount * 0.1);
    document.getElementById('scoreVal').innerText = score;
    updateCoinDisplay();
    try {
        const hs=Math.max(parseInt(localStorage.getItem('highScore')||'0',10),0);
        if(score>hs) localStorage.setItem('highScore',String(score));
        document.getElementById('highVal').innerText = Math.max(score,hs);
    } catch(e){}
    player.xp += amount;
    if(player.xp >= player.xpToNext) levelUp();
    const xpPct = Math.min(100,(player.xp/player.xpToNext)*100);
    document.getElementById('xp-fill').style.width = xpPct+'%';
    document.getElementById('levelVal').innerText = player.level;
}

function levelUp() {
    player.xp -= player.xpToNext;
    player.level++;
    player.xpToNext = Math.floor(player.xpToNext * 1.25 + 10);
    const bonuses = [
        ()=>{ player.maxHp++; player.hp=Math.min(player.hp+1,player.maxHp); updateHearts(); return '❤️ +1 Жизнь'; },
        ()=>{ player.dashCooldownMax=Math.max(15,player.dashCooldownMax-6); return '⚡ Рывок быстрее'; },
        ()=>{ player.dashRadius+=15; return '💥 Радиус рывка +15'; },
        ()=>{ ABILITIES[0].duration+=30; ABILITIES[0].cooldown=Math.max(200,ABILITIES[0].cooldown-50); return '🛡️ Щит дольше и CD−'; },
        ()=>{ ABILITIES[1].cooldown=Math.max(150,ABILITIES[1].cooldown-50); return '⚡ Молния CD−'; },
        ()=>{ ABILITIES[1].range=(ABILITIES[1].range||280)+40; return '⚡ Радиус молнии +40'; },
        ()=>{ ABILITIES[2].cooldown=Math.max(200,ABILITIES[2].cooldown-60); return '💣 Взрыв CD−'; },
        ()=>{ player.dashRadius+=20; player.dashDmg+=0.5; return '💥 Рывок сильнее +радиус'; },
        ()=>{ player.maxHp++; player.hp=Math.min(player.hp+1,player.maxHp); updateHearts(); return '❤️ +1 Жизнь'; },
        ()=>{ ABILITIES[0].cooldown=Math.max(180,ABILITIES[0].cooldown-60); ABILITIES[0].duration+=20; return '🛡️ Щит ещё быстрее'; },
    ];
    const bonusFn = bonuses[(player.level-2) % bonuses.length];
    const bonusText = bonusFn();
    shake=15;
    const banner=document.getElementById('lvlup-banner');
    document.getElementById('lvlup-num').innerText=player.level;
    document.getElementById('lvlup-bonus').innerText=bonusText;
    banner.style.display='block'; banner.style.animation='none';
    requestAnimationFrame(()=>{ banner.style.animation='lvlupAnim 2s forwards'; });
    setTimeout(()=>{ banner.style.display='none'; },2100);
    updateHearts();
}

// ════════════════════════════════════════════════════════════════
//  HEARTS
// ════════════════════════════════════════════════════════════════
function updateHearts() {
    const bar=document.getElementById('hp-bar'); bar.innerHTML='';
    for(let i=1;i<=player.maxHp;i++){
        const d=document.createElement('div');
        d.className=i>player.hp?'heart empty':'heart';
        bar.appendChild(d);
    }
}

function playerDie() {
    gameState='dead'; isPaused=true;
    document.getElementById('death-score').innerText = score+' очков';
    try {
        const hs=parseInt(localStorage.getItem('highScore')||'0',10)||0;
        document.getElementById('death-hs').innerText = score>=hs ? '🏆 НОВЫЙ РЕКОРД!' : 'Рекорд: '+hs;
    } catch(e){}
    document.getElementById('death-screen').style.display='block';
    for(let i=0;i<5;i++) setTimeout(()=>spawnParticles(player.x,player.y,20,['#ff0000','#cc0000','#ff4400'],12,60,10),i*120);
}

//  SHOP
// ════════════════════════════════════════════════════════════════
function updateCoinDisplay() {
    document.getElementById('coinVal').innerText = coins;
    const sc = document.getElementById('shopCoins');
    if (sc) sc.innerText = coins;
}
function openShop() {
    gameState='shop'; isPaused=true;
    renderShop();
    document.getElementById('shopScreen').classList.remove('hidden');
}
function closeShop() {
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('shop-screen').classList.remove('open');
    gameState='playing'; isPaused=false;
    requestAnimationFrame(loop);
}
function renderShop() {
    updateCoinDisplay();
    const container=document.getElementById('shopItems');
    if (!container) return;
    container.innerHTML='';
    SHOP_ITEMS.forEach(item=>{
        const soldOut=item.bought>=item.maxBuy, canAfford=coins>=item.cost;
        const d=document.createElement('div');
        d.className='shop-item'+(soldOut?' sold-out':'');
        d.innerHTML=`<div class="shop-item-icon">${item.icon}</div>
            <div class="shop-item-name">${item.name}</div>
            <div class="shop-item-desc">${item.desc}</div>
            <div class="shop-item-cost">${soldOut?'✅ Куплено':'💰 '+item.cost}</div>
            ${item.maxBuy>1?('<div class="shop-item-bought">Куплено: '+item.bought+'/'+item.maxBuy+'</div>'):''}
            <button class="buy-btn" ${soldOut||!canAfford?'disabled':''}>${soldOut?'Куплено':(canAfford?'Купить':'Нет монет')}</button>`;
        if(!soldOut&&canAfford){
            d.querySelector('.buy-btn').onclick=(e)=>{ e.stopPropagation(); buyItem(item); };
        }
        container.appendChild(d);
    });
}
function buyItem(item) {
    if(item.bought>=item.maxBuy||coins<item.cost) return;
    coins-=item.cost; item.bought++;
    updateCoinDisplay();
    switch(item.id){
        case 'maxhp':      player.maxHp++; player.hp=Math.min(player.hp+1,player.maxHp); updateHearts(); break;
        case 'dash':       player.dashCooldownMax=Math.max(15,Math.floor(player.dashCooldownMax*0.8)); break;
        case 'dashradius': player.dashRadius+=20; break;
        case 'ragecharge': /* handled via getRageMultiplier() */ break;
        case 'shield':     ABILITIES[0].cooldown=Math.max(180,Math.floor(ABILITIES[0].cooldown*0.75)); break;
        case 'lightning':  ABILITIES[1].cooldown=Math.max(120,Math.floor(ABILITIES[1].cooldown*0.75)); break;
    }
    renderShop();
}

//  SKINS
// ════════════════════════════════════════════════════════════════
function openSkins() {
    renderSkins();
    document.getElementById('skinScreen').classList.remove('hidden');
}
function closeSkins() {
    document.getElementById('skinScreen').classList.add('hidden');
}
function renderSkins() {
    const container = document.getElementById('skinItems');
    if (!container) return;
    container.innerHTML = '';
    SKINS.forEach(skin => {
        const card = document.createElement('div');
        card.className = 'skin-card' + (currentSkin === skin.id ? ' active' : '');

        // Preview — всегда canvas, без чёрного фона
        const wrap = document.createElement('div');
        wrap.className = 'skin-preview-wrap';
        const c = document.createElement('canvas');
        c.width = 90; c.height = 100;
        const cx = c.getContext('2d');
        cx.clearRect(0, 0, 90, 100); // transparent
        const img = images[skin.id];
        if (img instanceof HTMLImageElement && img.complete && img.naturalWidth > 0) {
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const sw = iw > 90 ? 90 : iw;
            const sh = ih > 90 ? 90 : ih;
            const scale = Math.min(90 / sw, 90 / sh);
            const dw = sw * scale, dh = sh * scale;
            const dx = (90 - dw) / 2, dy = (90 - dh) / 2;
            if (currentSkin === skin.id) {
                cx.shadowBlur = 25; cx.shadowColor = '#FFD700';
            }
            cx.drawImage(img, 0, 0, sw, sh, dx, dy, dw, dh);
            cx.shadowBlur = 0;
            cx.fillStyle = 'rgba(0,0,0,0.25)';
            cx.beginPath(); cx.ellipse(45, 96, 28, 5, 0, 0, Math.PI*2); cx.fill();
            c.classList.add('loaded');
        } else {
            cx.fillStyle = '#555';
            cx.font = 'bold 32px sans-serif'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
            cx.fillText('?', 45, 42);
            cx.strokeStyle = '#555'; cx.lineWidth = 1; cx.setLineDash([4,4]);
            cx.strokeRect(10, 5, 70, 80);
            cx.setLineDash([]);
        }
        wrap.appendChild(c);
        card.appendChild(wrap);

        // Name
        const name = document.createElement('div');
        name.className = 'sc-name';
        name.textContent = skin.name;
        card.appendChild(name);

        // Price
        const price = document.createElement('div');
        price.className = 'sc-price';
        const owned = skin.bought > 0;
        price.textContent = owned ? '' : '💰 ' + skin.cost;
        card.appendChild(price);

        // Button
        const btn = document.createElement('button');
        btn.className = 'sc-btn';
        if (currentSkin === skin.id) {
            btn.className += ' owned';
            btn.textContent = '✓ ВЫБРАН';
        } else if (!owned) {
            btn.className += ' buy';
            btn.textContent = 'КУПИТЬ ' + skin.cost;
            btn.onclick = (e) => {
                e.stopPropagation();
                if (coins < skin.cost) return;
                coins -= skin.cost;
                skin.bought = 1;
                updateCoinDisplay();
                currentSkin = skin.id;
                renderSkins();
            };
        } else {
            btn.className += ' select';
            btn.textContent = 'ВЫБРАТЬ';
            btn.onclick = (e) => {
                e.stopPropagation();
                currentSkin = skin.id;
                renderSkins();
            };
        }
        card.appendChild(btn);

        // Click on card = select (if owned)
        card.onclick = () => {
            if (currentSkin === skin.id) return;
            const o = skin.bought > 0;
            if (!o && coins < skin.cost) return;
            if (!o) { coins -= skin.cost; skin.bought = 1; updateCoinDisplay(); }
            currentSkin = skin.id;
            renderSkins();
        };

        container.appendChild(card);
    });
}

function useAbility(idx) {
    if(gameState!=='playing'||bossLoaderActive||isPaused) return;
    const ab=ABILITIES[idx];
    if(ab.timer>0) return;
    ab.timer=ab.cooldown;
    if(idx===0) {
        ab.active=true; ab.activeTimer=ABILITIES[0].duration;
        spawnParticles(player.x,player.y,20,['#00aaff','#ffffff','#0066ff'],6,40,8);
    } else if(idx===1) {
        const R=ABILITIES[1].range||280; let killed=0;
        enemies=enemies.filter(en=>{
            if(Math.hypot(en.x-player.x,en.y-player.y)<R){ spawnExplosion(en.x,en.y,['#aaff00','#ffff00','#fff']); addScore(100); killed++; return false; }
            return true;
        });
        miniBosses.forEach(mb=>{ if(Math.hypot(mb.x-player.x,mb.y-player.y)<R*0.7){ mb.hp-=5; spawnParticles(mb.x,mb.y,12,['#aaff00','#fff'],8,30,8); shake=15; } });
        spawnParticles(player.x,player.y,30,['#aaff00','#ffff00','#ffffff'],10,50,10);
        // FIX: rage заряжается от молнии всегда (не только вне ярости), но меньше
        player.rage=Math.min(100,player.rage+killed*5*(player.isRage?0.3:1));
    } else if(idx===2) {
        projectiles.forEach(p=>spawnExplosion(p.x,p.y,['#ff8800','#ffcc00','#fff']));
        projectiles=[]; shake=20;
        spawnParticles(player.x,player.y,25,['#ff6600','#ffcc00'],8,45,9);
    }
    updateAbilitiesUI();
}
function updateAbilitiesUI() {
    ABILITIES.forEach((ab,i)=>{
        const slot=document.getElementById('ab-slot-'+i); if(!slot) return;
        let cdEl=slot.querySelector('.ab-cd');
        if(ab.timer>0){
            if(!cdEl){ cdEl=document.createElement('div'); cdEl.className='ab-cd'; slot.appendChild(cdEl); }
            cdEl.textContent=Math.ceil(ab.timer/60)+'s'; slot.classList.remove('ready');
        } else { if(cdEl) cdEl.remove(); slot.classList.add('ready'); }
    });
}

const MINI_BOSS_TYPES = [
    { name:'СТРАЖ',     color:'#aa44ff', size:80, hp:15, speed:2.5, reward:500, pattern:'orbit',  imgKey:'mb_guard'  },
    { name:'ОХОТНИК',   color:'#ff6600', size:70, hp:10, speed:4,   reward:350, pattern:'zigzag', imgKey:'mb_hunter' },
    { name:'БОМБАРДИР', color:'#ff2244', size:90, hp:20, speed:1.5, reward:600, pattern:'shoot',  imgKey:'mb_bomber' },
];
function spawnMiniBoss() {
    const type=MINI_BOSS_TYPES[Math.floor(Math.random()*MINI_BOSS_TYPES.length)];
    miniBosses.push({ ...type, maxHp:type.hp, x:Math.random()*GAME_WIDTH, y:-80, timer:0, shootTimer:0, angle:0, phase:0 });
}
function updateMiniBosses() {
    for(let i=miniBosses.length-1;i>=0;i--){
        const mb=miniBosses[i]; mb.timer++;
        mb.y=Math.min(mb.y+mb.speed, 200+Math.random()*200);
        if(mb.pattern==='orbit'){ mb.angle+=0.02; mb.x+=Math.sin(mb.angle)*3; mb.x=Math.max(60,Math.min(GAME_WIDTH-60,mb.x)); }
        else if(mb.pattern==='zigzag'){ mb.x+=Math.sin(mb.timer*0.04)*5; mb.y=Math.min(mb.y+mb.speed,GAME_HEIGHT-100); mb.x=Math.max(60,Math.min(GAME_WIDTH-60,mb.x)); }
        else if(mb.pattern==='shoot'){
            mb.shootTimer++;
            if(mb.shootTimer>90){ mb.shootTimer=0; const a=Math.atan2(player.y-mb.y,player.x-mb.x); spawnProjectile(mb.x,mb.y,Math.cos(a)*6,Math.sin(a)*6,'ball',mb.color,14); }
        }
        const dist=Math.hypot(player.x-mb.x,player.y-mb.y);
        if((player.isDashing||player.isRage)&&dist<mb.size/2+player.dashRadius*0.5){
            const dmg=player.isRage?player.dashDmg*2:player.dashDmg;
            mb.hp-=dmg; shake=15;
            spawnParticles(mb.x,mb.y,10,[mb.color,'#fff'],7,30,7);
            player.isDashing=false;
            if(mb.hp<=0){
                spawnExplosion(mb.x,mb.y,[mb.color,'#ffcc00','#fff']);
                addScore(mb.reward); coins+=50;
                updateCoinDisplay();
                player.rage=Math.min(100,player.rage+20);
                miniBosses.splice(i,1); continue;
            }
        }
        if(dist<mb.size/2+22&&player.invulnerable<=0&&!player.isRage&&!ABILITIES[0].active){
            player.hp--; player.invulnerable=80; shake=28; updateHearts();
            if(player.hp<=0) playerDie();
        }
        if(mb.y>GAME_HEIGHT+100) miniBosses.splice(i,1);
    }
}
function drawMiniBosses() {
    miniBosses.forEach(mb=>{
        const drawSize=mb.size*1.8, img=images[mb.imgKey];
        ctx.save(); ctx.shadowBlur=20; ctx.shadowColor=mb.color;
        if(img&&img.complete&&img.naturalWidth!==0){
            if(mb.pattern==='zigzag'){ const tilt=Math.sin(mb.timer*0.04)*0.15; ctx.translate(mb.x,mb.y); ctx.rotate(tilt); ctx.drawImage(img,-drawSize/2,-drawSize/2,drawSize,drawSize); }
            else ctx.drawImage(img,mb.x-drawSize/2,mb.y-drawSize/2,drawSize,drawSize);
        } else { ctx.fillStyle=mb.color; ctx.beginPath();ctx.arc(mb.x,mb.y,drawSize/2,0,Math.PI*2);ctx.fill(); }
        ctx.restore();
        const bw=90,bx=mb.x-bw/2,by=mb.y-drawSize/2-18;
        ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,8);
        ctx.fillStyle=mb.color;ctx.fillRect(bx,by,mb.hp/mb.maxHp*bw,8);
        ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,8);
        ctx.fillStyle='#fff';ctx.font='bold 12px Courier New';ctx.textAlign='center';
        ctx.fillText(mb.name,mb.x,by-4);
    });
}

function spawnProjectile(x,y,vx,vy,type,color,radius){
    projectiles.push({x,y,vx,vy,type:type||'ball',color:color||'#ff4400',radius:radius||12,life:0});
}
function fireLaser(bossX,bossY,targetX,targetY,color){
    const angle=Math.atan2(targetY-bossY,targetX-bossX);
    projectiles.push({x:bossX,y:bossY,angle,type:'laser',color:color||'#ff2200',length:0,maxLength:700,speed:28,width:18,life:0,maxLife:80});
}
function fireSpread(bossX,bossY,targetX,targetY,count,color,radius){
    const base=Math.atan2(targetY-bossY,targetX-bossX), sp=0.45;
    for(let i=0;i<count;i++){
        const a=base+(i-(count-1)/2)*sp, spd=7+Math.random()*2;
        spawnProjectile(bossX,bossY,Math.cos(a)*spd,Math.sin(a)*spd,'ball',color,radius||14);
    }
}
function fireCircle(bossX,bossY,count,color,speed){
    for(let i=0;i<count;i++){
        const a=(i/count)*Math.PI*2, spd=speed||6;
        spawnProjectile(bossX,bossY,Math.cos(a)*spd,Math.sin(a)*spd,'fist',color||'#ff6600',16);
    }
}

function doBossAttack(boss,px,py){
    const t=boss.type;
    if(t==='conquest'){ fireLaser(boss.x,boss.y,px,py,'#ff8800'); if(boss.hp<boss.maxHp*0.5) fireLaser(boss.x,boss.y,px+120,py,'#ffaa00'); return true; }
    if(t==='kregg'){ if(boss.attackPhase%2===0) fireCircle(boss.x,boss.y,8,'#ff4444',5); else fireSpread(boss.x,boss.y,px,py,3,'#ff2200',14); boss.attackPhase=(boss.attackPhase||0)+1; return true; }
    if(t==='thragg'){ fireSpread(boss.x,boss.y,px,py,5,'#ff1100',16); const a=Math.atan2(py-boss.y,px-boss.x); spawnProjectile(boss.x,boss.y,Math.cos(a)*14,Math.sin(a)*14,'ball','#fff',10); return true; }
    return false;
}
function createBoss(type){
    const configs={
        conquest:{hp:30,maxHp:30,attackInterval:90,attacksBeforeStun:3,stunDuration:180,name:'КОНКВЕСТ',speed:0.04,size:250,imgKey:'boss'},
        kregg:   {hp:60,maxHp:60,attackInterval:75,attacksBeforeStun:4,stunDuration:150,name:'КРЕГГ',speed:0.05,size:250,imgKey:'kregg'},
        thragg:  {hp:120,maxHp:120,attackInterval:55,attacksBeforeStun:5,stunDuration:120,name:'ТРАГГ',speed:0.07,size:280,imgKey:'thragg'},
    };
    const cfg=configs[type];
    return{...cfg,type,x:600,y:-300,timer:0,attackTimer:cfg.attackInterval,attacksUntilStun:cfg.attacksBeforeStun,attackPhase:0,stunned:false,stunTimer:0,entered:false,phase:1};
}

// ════════════════════════════════════════════════════════════════
//  LINE-CIRCLE COLLISION
// ════════════════════════════════════════════════════════════════
function lineCircleCollide(x1,y1,x2,y2,cx,cy,r){
    const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
    if(len===0) return Math.hypot(cx-x1,cy-y1)<r;
    const t=Math.max(0,Math.min(1,((cx-x1)*dx+(cy-y1)*dy)/(len*len)));
    const nx=x1+t*dx-cx,ny=y1+t*dy-cy;
    return nx*nx+ny*ny<r*r;
}

        const dashSpeed=16;

// ════════════════════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════════════════════
function update(){
    if(isPaused||gameState==='dead'||gameState==='shop') return;
    if(shake>0) shake*=0.85;
    if(player.invulnerable>0) player.invulnerable--;
    if(player.dashCooldown>0) player.dashCooldown--;
    if(player.dashTimer>0) player.dashTimer--;
    if(player.dashTimer<=0) player.isDashing=false;

    // Shield cooldown
    const shield=ABILITIES[0];
    if(shield.active){ shield.activeTimer--; if(shield.activeTimer<=0) shield.active=false; }

    // Ability cooldowns
    ABILITIES.forEach(ab=>{ if(ab.timer>0){ab.timer--;updateAbilitiesUI();} });

    // Rage
    if(player.rage>=100) player.isRage=true;
    if(player.isRage){ player.rage-=0.4; player.invulnerable=2; if(player.rage<=0){player.rage=0;player.isRage=false;} }
    document.getElementById('rage-fill').style.width=player.rage+'%';

    // ── PLAYER MOVEMENT ──
    // FIX: во время рывка — двигаемся по вектору dashVX/dashVY, а не телепортируемся к курсору
    if(player.isDashing){
        player.x+=player.dashVX;
        player.y+=player.dashVY;
        // Трейл только здесь (убрали второй вызов)
        if(Math.random()<0.6) spawnDashTrail(player.x,player.y);
    } else {
        // FIX: замедлили с 0.06 → 0.035 (игрок чувствуется тяжелее)
        const lerpSpeed = 0.035;
        player.x += (player.targetX-player.x)*lerpSpeed;
        player.y += (player.targetY-player.y)*lerpSpeed;
    }

    const margin=40;
    player.x=Math.max(margin,Math.min(GAME_WIDTH-margin,player.x));
    player.y=Math.max(margin,Math.min(GAME_HEIGHT-margin,player.y));

    // Угол поворота
    const dx=player.targetX-player.x, dy=player.targetY-player.y;
    if(Math.hypot(dx,dy)>5){
        let ta=Math.atan2(dy,dx)+Math.PI/2;
        player.angle+=(ta-player.angle)*0.15;
    }

    stars.forEach(s=>{ s.y+=s.speed*(player.isDashing?8:1); if(s.y>GAME_HEIGHT){s.y=-10;s.x=Math.random()*GAME_WIDTH;} });
    updateParticles();

    // ── BOSS FIGHT ──
    if(isBossFight&&boss){
        boss.timer++;
        if(!boss.entered){ boss.y+=3; if(boss.y>=200){boss.y=200;boss.entered=true;} }
        boss.x+=(player.x-boss.x)*boss.speed*0.3;
        if(boss.hp<=boss.maxHp*0.5&&boss.phase===1){ boss.phase=2; boss.attackInterval=Math.max(30,boss.attackInterval-20); shake=25; }

        if(boss.stunned){
            boss.stunTimer--;
            if(boss.stunTimer<=0){boss.stunned=false;boss.attacksUntilStun=boss.attacksBeforeStun;boss.attackTimer=boss.attackInterval;}
            const distB=Math.hypot(player.x-boss.x,player.y-boss.y);
            if((player.isDashing||player.isRage)&&distB<boss.size*0.45){
                const dmg=player.isRage?player.dashDmg*3:player.dashDmg;
                boss.hp-=dmg; shake=22;
                player.dashTimer=0; player.isDashing=false;
                player.dashCooldown=player.dashCooldownMax;
                spawnParticles(boss.x,boss.y,15,['#FFD700','#ff8800','#fff'],8,35,9);
                boss.x+=(boss.x-player.x)*0.15;
                if(boss.hp<=0) killBoss();
            }
        } else {
            boss.attackTimer--;
            if(boss.attackTimer<=0&&boss.entered){
                const fired=doBossAttack(boss,player.x,player.y);
                if(fired){ boss.attacksUntilStun--; boss.attackTimer=boss.attackInterval;
                    if(boss.attacksUntilStun<=0){boss.stunned=true;boss.stunTimer=boss.stunDuration;projectiles=[];shake=18;} }
            }
            const distB=Math.hypot(player.x-boss.x,player.y-boss.y);
            if(distB<boss.size*0.38&&player.invulnerable<=0&&!player.isRage&&!shield.active){
                player.hp--; player.invulnerable=80; shake=30; updateHearts();
                if(player.hp<=0) playerDie();
            }
        }
        updateBossPhaseUI();
        updateMiniBosses();

        // ── PROJECTILES во время боя с боссом ──
        for(let i=projectiles.length-1;i>=0;i--){
            const p=projectiles[i]; p.life++;
            if(p.type==='laser'){
                p.length=Math.min(p.length+p.speed,p.maxLength);
                if(p.life>p.maxLife){projectiles.splice(i,1);continue;}
                const ex=p.x+Math.cos(p.angle)*p.length, ey=p.y+Math.sin(p.angle)*p.length;
                if(player.invulnerable<=0&&!player.isRage&&!shield.active&&lineCircleCollide(p.x,p.y,ex,ey,player.x,player.y,22)){
                    player.hp--;player.invulnerable=80;shake=30;updateHearts();if(player.hp<=0)playerDie();
                }
            } else {
                p.x+=p.vx;p.y+=p.vy;
                if(p.x<-50||p.x>GAME_WIDTH+50||p.y<-50||p.y>GAME_HEIGHT+50){projectiles.splice(i,1);continue;}
                const dist=Math.hypot(player.x-p.x,player.y-p.y);
                if(dist<p.radius+18&&player.invulnerable<=0&&!player.isRage&&!shield.active){
                    player.hp--;player.invulnerable=80;shake=28;projectiles.splice(i,1);updateHearts();if(player.hp<=0)playerDie();
                }
            }
        }

    } else {
        // ── NORMAL PLAY ──
        enemySpawnTimer++;
        miniBossSpawnTimer++;
        healthPackTimer++;
        waveTimer++;

        // ── HEALTH PACK SPAWN ──
        // Спавним аптечку каждые ~900 тиков (≈15 сек), только если у игрока неполное HP
        // Чем меньше HP — тем чаще появляются (на 1 HP шанс удваивается)
        const hpSpawnInterval = Math.max(400, 900 - (player.maxHp - player.hp) * 150);
        if(healthPackTimer >= hpSpawnInterval && healthPacks.length < 2){
            healthPackTimer = 0;
            healthPacks.push({
                x: 80 + Math.random() * (GAME_WIDTH - 160),
                y: -30,
                speed: 1.2 + Math.random() * 0.6,
                pulse: 0,   // для анимации пульсации
                age: 0      // возраст (для притяжения и исчезновения)
            });
        }

        const spawnRate = Math.max(35, 60 - Math.min(wave * 2, 30));
        const maxEnemies = 15 + wave * 2;

        if(inWave){
            // Спавн обычных врагов
            if(enemySpawnTimer>=spawnRate && enemies.length<maxEnemies){
                enemySpawnTimer=0;
                enemies.push({
                    x: Math.random()*GAME_WIDTH,
                    y: -50,
                    speed: 2.5 + Math.random()*2 + wave*0.1,
                    hp: 2
                });
            }

            // FIX: спавн мини-боссов каждые ~900 тиков начиная с волны 2
            if(wave>=2 && miniBossSpawnTimer >= Math.max(600, 1100-wave*50)){
                miniBossSpawnTimer=0;
                spawnMiniBoss();
            }

            // Конец волны
            if(waveTimer>=waveDuration){ inWave=false; waveTimer=0; }

        } else {
            // Пауза между волнами
            if(waveTimer>=breakTime){
                inWave=true; waveTimer=0; enemySpawnTimer=0;
                wave++;
                document.getElementById('waveVal').innerText=wave;
                showWaveBanner(wave, wave%5===0?'ЭЛИТНАЯ ВОЛНА!':'');

                // FIX: триггеры боссов на нужных волнах
                if(wave===5)  { triggerBoss('conquest'); return; }
                if(wave===10) { triggerBoss('kregg');    return; }
                if(wave===15) { triggerBoss('thragg');   return; }
            }
        }

        // ── PROJECTILES ──
        for(let i=projectiles.length-1;i>=0;i--){
            const p=projectiles[i]; p.life++;
            if(p.type==='laser'){
                p.length=Math.min(p.length+p.speed,p.maxLength);
                if(p.life>p.maxLife){projectiles.splice(i,1);continue;}
                const ex=p.x+Math.cos(p.angle)*p.length, ey=p.y+Math.sin(p.angle)*p.length;
                if(player.invulnerable<=0&&!player.isRage&&!shield.active&&lineCircleCollide(p.x,p.y,ex,ey,player.x,player.y,22)){
                    player.hp--;player.invulnerable=80;shake=30;updateHearts();if(player.hp<=0)playerDie();
                }
            } else {
                p.x+=p.vx;p.y+=p.vy;
                if(p.x<-50||p.x>GAME_WIDTH+50||p.y<-50||p.y>GAME_HEIGHT+50){projectiles.splice(i,1);continue;}
                const dist=Math.hypot(player.x-p.x,player.y-p.y);
                if(dist<p.radius+18&&player.invulnerable<=0&&!player.isRage&&!shield.active){
                    player.hp--;player.invulnerable=80;shake=28;projectiles.splice(i,1);updateHearts();if(player.hp<=0)playerDie();
                }
            }
        }

        // ── HEALTH PACKS ──
        for(let i=healthPacks.length-1;i>=0;i--){
            const hp=healthPacks[i];
            hp.y+=hp.speed;
            hp.pulse=(hp.pulse||0)+0.08;
            hp.age=(hp.age||0)+1;

            // Притяжение к игроку когда рядом (в радиусе 120px)
            const hpDist=Math.hypot(player.x-hp.x,player.y-hp.y);
            if(hpDist<120){
                hp.x+=(player.x-hp.x)*0.06;
                hp.y+=(player.y-hp.y)*0.06;
            }

            // Подбор
            if(hpDist<28){
                if(player.hp<player.maxHp){
                    player.hp++;
                    updateHearts();
                    // Зелёные частицы при подборе
                    spawnParticles(hp.x,hp.y,16,['#00ff44','#00cc22','#88ffaa','#ffffff'],7,35,7);
                    spawnParticles(player.x,player.y,8,['#00ff44','#00cc22'],4,25,5);
                } else {
                    // Полное HP — конвертируем в монеты
                    coins+=50;
                    updateCoinDisplay();
                    spawnParticles(hp.x,hp.y,10,['#FFD700','#ffaa00','#fff'],6,30,6);
                }
                healthPacks.splice(i,1); continue;
            }

            // Исчезает через ~8 сек (480 тиков), улетает вверх
            if(hp.age>480){
                hp.speed-=0.15;
                if(hp.y<-60) { healthPacks.splice(i,1); continue; }
            }

            if(hp.y>GAME_HEIGHT+60) healthPacks.splice(i,1);
        }

        // ── ENEMIES ──
        for(let i=enemies.length-1;i>=0;i--){
            const en=enemies[i];
            en.y+=en.speed;
            const dist=Math.hypot(player.x-en.x,player.y-en.y);

            if((player.isDashing||player.isRage)&&dist<player.dashRadius){
                en.hp--;
                spawnParticles(en.x,en.y,6,['#ff88ff','#fff','#ff44aa'],5,20,5);
                if(en.hp<=0){
                    enemies.splice(i,1);
                    addScore(100);
                    // FIX: rage заряжается и во время ярости, но меньше (×0.3)
                    player.rage=Math.min(100, player.rage + 8*getRageMultiplier()*(player.isRage?0.15:1));
                }
            } else if(dist<40&&player.invulnerable<=0&&!player.isRage&&!shield.active){
                player.hp--;
                player.invulnerable=60;
                shake=25;
                updateHearts();
                if(player.hp<=0) playerDie();
            }
            if(en.y>GAME_HEIGHT+50) enemies.splice(i,1);
        }

        // ── ROCKS ──
        for(let i=rocks.length-1;i>=0;i--){
            const r=rocks[i]; r.y+=r.speed;
            if(Math.hypot(player.x-r.x,player.y-r.y)<r.size/2+30&&player.invulnerable<=0&&!shield.active){
                if(!player.isRage){player.hp--;player.invulnerable=60;shake=30;updateHearts();if(player.hp<=0)playerDie();}
                rocks.splice(i,1); continue;
            }
            if(r.y>GAME_HEIGHT+50) rocks.splice(i,1);
        }

        // Мини-боссы в обычном режиме
        updateMiniBosses();
    }
}

// ════════════════════════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════════════════════════
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#000005'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    if(shake>1) ctx.translate(Math.random()*shake-shake/2,Math.random()*shake-shake/2);
    ctx.strokeStyle='rgba(255,215,0,0.25)'; ctx.lineWidth=5; ctx.strokeRect(0,0,GAME_WIDTH,GAME_HEIGHT);

    if(currentLocation==='viltrum'&&images.viltrum_bg&&images.viltrum_bg.complete){
        ctx.globalAlpha=0.45;ctx.drawImage(images.viltrum_bg,0,0,GAME_WIDTH,GAME_HEIGHT);ctx.globalAlpha=1;
    }

    // Stars
    ctx.fillStyle='white';
    stars.forEach(s=>ctx.fillRect(s.x,s.y,s.size,s.size));

    // Health packs
    healthPacks.forEach(hp=>{
        const pulse = Math.sin(hp.pulse||0)*0.35+0.65; // 0.3..1.0
        const fade  = hp.age>400 ? Math.max(0,(480-hp.age)/80) : 1;
        const r     = 16 + Math.sin(hp.pulse||0)*3;    // пульсирующий радиус

        ctx.save();
        ctx.globalAlpha = fade;

        // Внешнее свечение
        ctx.shadowBlur  = 20 + pulse*14;
        ctx.shadowColor = '#00ff44';

        // Круг аптечки
        ctx.fillStyle = `rgba(0,${Math.floor(160+pulse*80)},40,0.9)`;
        ctx.beginPath(); ctx.arc(hp.x,hp.y,r,0,Math.PI*2); ctx.fill();

        // Белая обводка
        ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(hp.x,hp.y,r,0,Math.PI*2); ctx.stroke();

        // Крест
        ctx.shadowBlur=0;
        ctx.fillStyle='#fff';
        ctx.fillRect(hp.x-7, hp.y-2.5, 14, 5);
        ctx.fillRect(hp.x-2.5, hp.y-7, 5, 14);

        // Метка +HP если полное HP → монеты
        if(player.hp>=player.maxHp){
            ctx.font='bold 10px Courier New'; ctx.textAlign='center';
            ctx.fillStyle='#FFD700'; ctx.fillText('💰',hp.x,hp.y+r+14);
        }

        ctx.restore();
    });

    // Rocks
    ctx.fillStyle='#888';
    rocks.forEach(r=>{ ctx.beginPath();ctx.arc(r.x,r.y,r.size/2,0,Math.PI*2);ctx.fill(); ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.stroke(); });

    // Enemies
    enemies.forEach(en=>{
        if(images.enemy&&images.enemy.complete&&images.enemy.naturalWidth!==0) ctx.drawImage(images.enemy,en.x-35,en.y-35,70,70);
        else{ ctx.fillStyle='hotpink';ctx.beginPath();ctx.arc(en.x,en.y,22,0,Math.PI*2);ctx.fill(); }
    });

    drawMiniBosses();
    drawParticles();

    // Projectiles
    projectiles.forEach(p=>{
        if(p.type==='laser'){
            const ex=p.x+Math.cos(p.angle)*p.length, ey=p.y+Math.sin(p.angle)*p.length;
            ctx.save();
            ctx.strokeStyle=p.color;ctx.lineWidth=p.width+6;ctx.globalAlpha=0.2;
            ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(ex,ey);ctx.stroke();
            ctx.globalAlpha=0.9;ctx.lineWidth=p.width*0.5;ctx.strokeStyle='#fff';
            ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(ex,ey);ctx.stroke();
            ctx.globalAlpha=0.7;ctx.lineWidth=p.width;ctx.strokeStyle=p.color;
            ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(ex,ey);ctx.stroke();
            ctx.restore();
        } else {
            ctx.save();
            ctx.shadowBlur=10;ctx.shadowColor=p.color;
            ctx.fillStyle=p.color;
            ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
            if(p.type==='fist'){ctx.strokeStyle='rgba(255,200,0,0.7)';ctx.lineWidth=3;ctx.stroke();}
            ctx.restore();
        }
    });

    // Boss
    if(isBossFight&&boss&&boss.entered){
        const img=images[boss.imgKey];
        ctx.save();
        if(boss.stunned){ctx.shadowBlur=50+Math.sin(Date.now()*0.02)*20;ctx.shadowColor='#FFD700';}
        else if(boss.phase===2){ctx.shadowBlur=30+Math.sin(Date.now()*0.015)*15;ctx.shadowColor='#ff0000';}
        if(img&&img.complete&&img.naturalWidth!==0) ctx.drawImage(img,boss.x-boss.size/2,boss.y-boss.size/2,boss.size,boss.size);
        else{ ctx.fillStyle=boss.stunned?'#aa8800':(boss.phase===2?'#cc0000':'#880000');ctx.beginPath();ctx.arc(boss.x,boss.y,80,0,Math.PI*2);ctx.fill(); }
        ctx.restore();
        if(boss.stunned){
            ctx.font='bold 36px serif';ctx.textAlign='center';ctx.fillStyle='#FFD700';
            ctx.fillText('⚡ ОГЛУШЁН ⚡',boss.x,boss.y-boss.size/2-50);
        }
        const bW=200,bX=boss.x-bW/2,bY=boss.y-boss.size/2-28;
        ctx.fillStyle='#1a0000';ctx.fillRect(bX,bY,bW,14);
        ctx.fillStyle=boss.stunned?'#FFD700':(boss.phase===2?'#ff0000':'#ff4400');
        ctx.fillRect(bX,bY,(boss.hp/boss.maxHp)*bW,14);
        ctx.strokeStyle='#8B0000';ctx.lineWidth=1.5;ctx.strokeRect(bX,bY,bW,14);
        ctx.fillStyle='#ff6600';ctx.font='bold 15px Courier New';ctx.textAlign='center';
        ctx.fillText(boss.name,boss.x,bY-6);
    }

    // Player
    ctx.save();
    ctx.translate(player.x,player.y); ctx.rotate(player.angle);
    if(ABILITIES[0].active){ ctx.shadowBlur=40;ctx.shadowColor='#00aaff';ctx.strokeStyle='rgba(0,170,255,0.4)';ctx.lineWidth=8;ctx.beginPath();ctx.arc(0,0,40,0,Math.PI*2);ctx.stroke(); }
    if(player.isRage){ ctx.shadowBlur=40;ctx.shadowColor='red'; }
    else if(player.isDashing){ ctx.shadowBlur=20;ctx.shadowColor='cyan'; }
    if(player.invulnerable>0&&Math.floor(Date.now()/50)%2===0) ctx.globalAlpha=0.3;
    const scaleY=player.isDashing?1.4:1.0;
    const skinImg = images[currentSkin];
    if(skinImg instanceof HTMLImageElement && skinImg.complete && skinImg.naturalWidth > 0) ctx.drawImage(skinImg,-65,-65*scaleY,130,130*scaleY);
    else{ ctx.fillStyle='cyan';ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.fill(); }
    ctx.restore();
    ctx.restore(); // end shake

    // Pause overlay
    if(isPaused&&!bossLoaderActive&&gameState==='playing'){
        ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 80px Courier New';
        ctx.shadowBlur=10;ctx.shadowColor='#FFD700';ctx.fillText('ПАУЗА',canvas.width/2,canvas.height/2-20);
        ctx.shadowBlur=0;ctx.font='24px Courier New';ctx.fillStyle='#aaa';
        ctx.fillText('Нажми ESC для продолжения',canvas.width/2,canvas.height/2+40);
    }
}

// ════════════════════════════════════════════════════════════════
//  LOOP
// ════════════════════════════════════════════════════════════════
function loop(){
    if(gameState==='playing'||gameState==='dead'){
        update(); draw();
        if(gameState==='playing') requestAnimationFrame(loop);
    }
}

</script>
